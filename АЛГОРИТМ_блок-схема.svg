<svg width="100%" viewBox="0 0 680 1180" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Блок-схема алгоритма формирования плана питания</title>
<desc>Последовательность от входных данных пользователя через фильтрацию блюд, жадный подбор, балансировку по КБЖУ, проверку коридора и нормы микронутриентов до выдачи плана и списка покупок. Соответствует матмодели v2 и функционалу v4.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.t{font-family:sans-serif;font-size:14px;fill:#2C2C2A}
.th{font-family:sans-serif;font-size:14px;font-weight:500;fill:#2C2C2A}
.ts{font-family:sans-serif;font-size:12px;fill:#5F5E5A}
.arr{stroke:#5F5E5A;stroke-width:1.5;fill:none}
.startend{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5}
.io{fill:#E6F1FB;stroke:#185FA5;stroke-width:0.5}
.proc{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5}
.calc{fill:#EEEDFE;stroke:#534AB7;stroke-width:0.5}
.dec{fill:#FAEEDA;stroke:#854F0B;stroke-width:0.5}
.warn{fill:#FCEBEB;stroke:#A32D2D;stroke-width:0.5}
.neut{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5}
</style>
</defs>

<rect class="startend" x="240" y="20" width="200" height="44" rx="22"/><text class="th" x="340" y="46" text-anchor="middle">Начало</text>
<line x1="340" y1="64" x2="340" y2="92" class="arr" marker-end="url(#arrow)"/>

<rect class="io" x="200" y="92" width="280" height="56" rx="8"/><text class="th" x="340" y="115" text-anchor="middle">Блок 1. Приём входных данных</text><text class="ts" x="340" y="134" text-anchor="middle">профиль, цель, ограничения, недобор</text>
<line x1="340" y1="148" x2="340" y2="176" class="arr" marker-end="url(#arrow)"/>

<rect class="io" x="200" y="176" width="280" height="56" rx="8"/><text class="th" x="340" y="199" text-anchor="middle">Блок 2. Целевые показатели</text><text class="ts" x="340" y="218" text-anchor="middle">норма МР × поправка цели</text>
<line x1="340" y1="232" x2="340" y2="260" class="arr" marker-end="url(#arrow)"/>

<rect class="io" x="200" y="260" width="280" height="56" rx="8"/><text class="th" x="340" y="283" text-anchor="middle">Блок 3. Распределение по приёмам</text><text class="ts" x="340" y="302" text-anchor="middle">учёт закреплённых, остаток</text>
<line x1="340" y1="316" x2="340" y2="344" class="arr" marker-end="url(#arrow)"/>

<rect class="proc" x="200" y="344" width="280" height="56" rx="8"/><text class="th" x="340" y="367" text-anchor="middle">Блок 4. Фильтрация каталога</text><text class="ts" x="340" y="386" text-anchor="middle">диета, аллергии, исключения</text>
<line x1="340" y1="400" x2="340" y2="428" class="arr" marker-end="url(#arrow)"/>

<rect class="proc" x="200" y="428" width="280" height="56" rx="8"/><text class="th" x="340" y="451" text-anchor="middle">Блок 5. Процедура: жадный подбор</text><text class="ts" x="340" y="470" text-anchor="middle">мин. штраф F по приёмам пищи</text>
<line x1="340" y1="484" x2="340" y2="512" class="arr" marker-end="url(#arrow)"/>

<rect class="proc" x="200" y="512" width="280" height="56" rx="8"/><text class="th" x="340" y="535" text-anchor="middle">Блок 6. Балансировка по КБЖУ</text><text class="ts" x="340" y="554" text-anchor="middle">локальный поиск, замены</text>
<line x1="340" y1="568" x2="340" y2="596" class="arr" marker-end="url(#arrow)"/>

<rect class="calc" x="200" y="596" width="280" height="56" rx="8"/><text class="th" x="340" y="619" text-anchor="middle">Блок 7. Расчёт недобора</text><text class="ts" x="340" y="638" text-anchor="middle">микронутриенты за неделю</text>
<line x1="340" y1="652" x2="340" y2="680" class="arr" marker-end="url(#arrow)"/>

<polygon class="dec" points="340,680 470,740 340,800 210,740"/><text class="th" x="340" y="737" text-anchor="middle">Блок 8. Коридор</text><text class="ts" x="340" y="755" text-anchor="middle">в норме?</text>

<text class="ts" x="356" y="820">Да</text>
<line x1="340" y1="800" x2="340" y2="836" class="arr" marker-end="url(#arrow)"/>

<line x1="470" y1="740" x2="560" y2="740" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="486" y="734">Нет</text>
<rect class="warn" x="500" y="712" width="160" height="56" rx="8"/><text class="th" x="580" y="733" text-anchor="middle">Блок 9. Предупре-</text><text class="th" x="580" y="749" text-anchor="middle">ждение</text><text class="ts" x="580" y="765" text-anchor="middle">выбор пользователя</text>
<path d="M580 712 L580 456 L480 456" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="586" y="586">переформировать</text>

<rect class="proc" x="200" y="836" width="280" height="56" rx="8"/><text class="th" x="340" y="859" text-anchor="middle">Блок 10. Список покупок</text><text class="ts" x="340" y="878" text-anchor="middle">агрегация × число персон</text>
<line x1="340" y1="892" x2="340" y2="920" class="arr" marker-end="url(#arrow)"/>

<polygon class="dec" points="340,920 470,976 340,1032 210,976"/><text class="th" x="340" y="973" text-anchor="middle">Блок 11. Магазин</text><text class="ts" x="340" y="991" text-anchor="middle">выбран?</text>

<line x1="470" y1="976" x2="560" y2="976" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="486" y="970">Нет</text>
<rect class="neut" x="500" y="948" width="160" height="56" rx="8"/><text class="th" x="580" y="971" text-anchor="middle">Блок 12. Без</text><text class="th" x="580" y="987" text-anchor="middle">оценки цены</text>

<text class="ts" x="356" y="1052">Да</text>
<line x1="340" y1="1032" x2="340" y2="1060" class="arr" marker-end="url(#arrow)"/>
<rect class="io" x="200" y="1060" width="280" height="44" rx="8"/><text class="th" x="340" y="1086" text-anchor="middle">Блок 13. Вилка цены [мин; макс]</text>

<path d="M580 1004 L580 1148 L456 1148" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="1104" x2="340" y2="1148" class="arr" marker-end="url(#arrow)"/>
<rect class="startend" x="240" y="1126" width="200" height="44" rx="22"/><text class="th" x="340" y="1152" text-anchor="middle">Конец</text>
</svg>
